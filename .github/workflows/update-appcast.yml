name: Update Appcast

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  update-appcast:
    runs-on: macos-15
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Sparkle Binaries
        id: sparkle
        run: |
          curl -L -O https://github.com/sparkle-project/Sparkle/releases/download/2.9.1/Sparkle-2.9.1.tar.xz
          tar -xf Sparkle-2.9.1.tar.xz
          if [ -f "./bin/generate_appcast" ]; then
            echo "bin_dir=$(pwd)/bin" >> $GITHUB_OUTPUT
          else
            echo "ERROR: generate_appcast not found in Sparkle distribution"
            exit 1
          fi

      - name: Get Latest Release
        id: latest_release
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0)
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Generate and Update appcast.xml
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "WARNING: SPARKLE_PRIVATE_KEY not set, skipping appcast update"
            exit 0
          fi

          # Create temporary directory for appcast generation
          mkdir -p /tmp/appcast_gen
          cd /tmp/appcast_gen

          # Download all releases to generate appcast
          echo "Downloading releases for appcast generation..."
          gh release download --repo ${{ github.repository }} --pattern "*.dmg" --dir . || true

          # Generate appcast.xml
          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_key
          ${{ steps.sparkle.outputs.bin_dir }}/generate_appcast \
            --ed-key-file /tmp/sparkle_key \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/" \
            .
          rm /tmp/sparkle_key

          # Post-process appcast.xml to dynamically insert the tag folder into the download URLs
          if [ -f "appcast.xml" ]; then
            echo "Post-processing appcast.xml to fix download URLs..."
            python3 -c "import re, sys; p = sys.argv[1]; c = open(p).read(); c = re.sub(r'releases/download/NV5-([v]?[0-9a-zA-Z\.\-]+)\.dmg', r'releases/download/\1/NV5-\1.dmg', c); open(p, 'w').write(c)" appcast.xml
          fi

          # Copy generated appcast to safe temp path instead of workspace root
          if [ -f "appcast.xml" ]; then
            cp appcast.xml /tmp/appcast.xml.final
            echo "appcast.xml generated successfully in /tmp"
          else
            echo "ERROR: appcast.xml not generated"
            exit 1
          fi

      - name: Commit and Push appcast.xml
        run: |
          cd ${{ github.workspace }}

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 1. Check out or create the 'appcast' branch
          git fetch origin appcast || true
          
          if git show-ref --quiet refs/remotes/origin/appcast; then
            echo "Checking out existing appcast branch..."
            git checkout appcast || git checkout -b appcast origin/appcast
            git pull origin appcast --rebase || true
          else
            echo "Creating orphan appcast branch..."
            git checkout --orphan appcast
            git rm -rf .
          fi

          # 2. Bring the generated appcast.xml back
          cp /tmp/appcast.xml.final ./appcast.xml

          # 4. Check if there are actual changes
          if git status --porcelain | grep -q "appcast.xml"; then
            echo "Changes detected in appcast.xml"
          else
            echo "No changes to appcast.xml"
            exit 0
          fi

          # 5. Add and commit
          git add appcast.xml
          git commit -m "chore: update appcast for ${{ steps.latest_release.outputs.tag }}"

          # 6. Push with retry logic to origin appcast
          for i in {1..3}; do
            if git push origin appcast; then
              echo "Successfully pushed appcast.xml to appcast branch"
              exit 0
            fi
            if [ $i -lt 3 ]; then
              echo "Push failed, retrying in 5 seconds..."
              sleep 5
              git pull origin appcast --rebase || true
            fi
          done

          echo "ERROR: Failed to push appcast.xml to appcast branch after 3 attempts"
          exit 1
