name: Update Appcast

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  update-appcast:
    runs-on: macos-15
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Locate Sparkle bin
        id: sparkle
        run: |
          SPARKLE_BIN=$(find ~/Library/Developer/Xcode/DerivedData -name "sign_update" -type f -not -path "*/old_dsa_scripts/*" 2>/dev/null | head -n 1)
          if [ -z "$SPARKLE_BIN" ]; then
            SPARKLE_BIN=$(find ~/.cache -name "sign_update" -type f 2>/dev/null | head -n 1)
          fi
          if [ -z "$SPARKLE_BIN" ]; then
            SPARKLE_BIN=$(find ~/Library/Caches/org.swift.swiftpm -name "sign_update" -type f 2>/dev/null | head -n 1)
          fi
          if [ -z "$SPARKLE_BIN" ]; then
            echo "ERROR: sign_update not found"
            exit 1
          fi
          echo "Found sign_update at: $SPARKLE_BIN"
          echo "bin_dir=$(dirname $SPARKLE_BIN)" >> $GITHUB_OUTPUT

      - name: Get Latest Release
        id: latest_release
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0)
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Generate and Update appcast.xml
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
            echo "WARNING: SPARKLE_PRIVATE_KEY not set, skipping appcast update"
            exit 0
          fi

          # Create temporary directory for appcast generation
          mkdir -p /tmp/appcast_gen
          cd /tmp/appcast_gen

          # Download all releases to generate appcast
          echo "Downloading releases for appcast generation..."
          gh release download --repo ${{ github.repository }} --pattern "*.dmg" --dir . || true

          # Generate appcast.xml
          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_key
          ${{ steps.sparkle.outputs.bin_dir }}/generate_appcast \
            --ed-key-file /tmp/sparkle_key \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/" \
            .
          rm /tmp/sparkle_key

          # Copy generated appcast to repo root
          if [ -f "appcast.xml" ]; then
            cp appcast.xml ${{ github.workspace }}/appcast.xml
            echo "appcast.xml generated successfully"
          else
            echo "ERROR: appcast.xml not generated"
            exit 1
          fi

      - name: Commit and Push appcast.xml
        run: |
          cd ${{ github.workspace }}

          # Check if appcast.xml has changes
          if git diff --quiet appcast.xml; then
            echo "No changes to appcast.xml"
            exit 0
          fi

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Ensure we're on main branch with latest changes
          git fetch origin main
          git checkout main
          git pull origin main --rebase

          # Add and commit
          git add appcast.xml
          git commit -m "chore: update appcast for ${{ steps.latest_release.outputs.tag }}"

          # Push with retry logic
          for i in {1..3}; do
            if git push origin main; then
              echo "Successfully pushed appcast.xml"
              exit 0
            fi
            if [ $i -lt 3 ]; then
              echo "Push failed, retrying in 5 seconds..."
              sleep 5
              git pull origin main --rebase
            fi
          done

          echo "ERROR: Failed to push appcast.xml after 3 attempts"
          exit 1
