name: NV5
options:
  createIntermediateGroups: true
  groupSortPosition: top
  bundleIdPrefix: com.nv5
  deploymentTarget:
    macOS: "14.0"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.4.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.0.0"

targets:
  NVModel:
    type: framework
    platform: macOS
    sources:
      - Packages/NVModel/Sources
    settings:
      base:
        PRODUCT_NAME: NVModel
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"

  NVStore:
    type: framework
    platform: macOS
    sources:
      - Packages/NVStore/Sources
    dependencies:
      - package: GRDB
      - target: NVModel
    settings:
      base:
        PRODUCT_NAME: NVStore
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"

  NVCrypto:
    type: framework
    platform: macOS
    sources:
      - Packages/NVCrypto/Sources
    settings:
      base:
        PRODUCT_NAME: NVCrypto
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"

  NVSync:
    type: framework
    platform: macOS
    sources:
      - Packages/NVSync/Sources
    dependencies:
      - target: NVModel
      - target: NVStore
      - target: NVCrypto
    settings:
      base:
        PRODUCT_NAME: NVSync
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"

  NVSyncTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Packages/NVSync/Tests
    dependencies:
      - target: NVSync
      - target: NVModel
      - target: NVStore
      - target: NVCrypto
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"

  NVKit:
    type: framework
    platform: macOS
    sources:
      - Packages/NVKit/Sources
    dependencies:
      - target: NVModel
    settings:
      base:
        PRODUCT_NAME: NVKit
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"

  NV5App:
    type: application
    platform: macOS
    sources:
      - App
    dependencies:
      - target: NVModel
      - target: NVStore
      - target: NVCrypto
      - target: NVSync
      - target: NVKit
      - package: KeyboardShortcuts
      - package: Sparkle
    settings:
      base:
        PRODUCT_NAME: NV5
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: App/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: App/Resources/NV5App.entitlements
      properties:
        com.apple.security.app-sandbox: true

schemes:
  NV5App:
    build:
      targets:
        NV5App: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - NVSyncTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release